services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: enterprise_ipam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/enterprise_ipam
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
